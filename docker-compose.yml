services:
  postgres:
    image: postgres:16
    container_name: dental-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./out/pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dental-redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dental-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - postgres

  postgres-migrate:
    image: migrate/migrate
    container_name: dental-postgres-migrate
    volumes:
      - ./database/migrations:/migrations
    depends_on:
      - postgres
